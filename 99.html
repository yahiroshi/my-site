<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わくわく九九れんしゅう</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', 'Comic Sans MS', sans-serif;
            background-color: #fff9e6;
            text-align: center;
            padding: 20px 10px;
            color: #333;
            touch-action: manipulation; 
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 550px;
            margin: 0 auto;
            border: 4px solid #ffb347;
            position: relative;
        }
        h1 {
            color: #ff8c00;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .controls {
            background-color: #fff3e0;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
        }
        .mode-btn {
            background-color: #ffffff;
            color: #555;
            border: 2px solid #ddd;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }
        select {
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            background-color: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        select:disabled {
            border-color: #ccc;
            background-color: #eee;
            color: #999;
        }
        .hint-btn {
            background-color: #fff;
            color: #4a90e2;
            border: 2px solid #4a90e2;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .question {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            color: #4a90e2;
        }
        .visualizer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 15px auto;
            min-height: 40px;
        }
        .emoji-group {
            background-color: #f0f8ff;
            border: 2px dashed #a0c4ff;
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            gap: 2px;
            font-size: 18px;
        }
        
        /* 答えの入力欄（onfocus="this.blur()" でキーボードを確実に出さない） */
        input[type="text"] {
            font-size: 40px;
            width: 150px;
            text-align: center;
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 15px;
            margin-bottom: 15px;
            outline: none;
            background-color: #fafafa;
            color: #333;
            font-weight: bold;
        }

        /* テンキーのデザイン */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto 15px auto;
        }
        .key-btn {
            background-color: #fff;
            border: 2px solid #ccc;
            border-radius: 15px;
            padding: 15px 0;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 0 #bbb;
            user-select: none; 
            -webkit-user-select: none;
        }
        .key-btn:active {
            transform: translateY(4px);
            box-shadow: none;
            background-color: #f0f0f0;
        }
        .key-action {
            background-color: #eee;
            color: #e74c3c;
        }

        .answer-btn {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cc7000;
            width: 100%;
            max-width: 300px;
        }
        .answer-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .feedback {
            font-size: 24px;
            font-weight: bold;
            height: 35px;
            margin: 15px 0;
        }
        .score {
            font-size: 18px;
            color: #666;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px dashed #eee;
        }

        /* モーダルのデザイン */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background-color: #fff9e6;
            margin: 5% auto;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            border: 4px solid #4a90e2;
            position: relative;
        }
        .close-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .cheat-sheet {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .cheat-col {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 120px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cheat-col h3 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px dashed #ccc;
            font-size: 18px;
            color: white;
            border-radius: 5px;
        }
        .cheat-row {
            font-size: 18px;
            margin: 5px 0;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ わくわく 九九れんしゅう ✨</h1>
        
        <div class="controls">
            <div class="mode-buttons">
                <button type="button" class="mode-btn active" id="btn-seq" onclick="setMode('sequential')">じゅんばん</button>
                <button type="button" class="mode-btn" id="btn-rand" onclick="setMode('random')">ランダム</button>
            </div>
            <div>
                <select id="table-select" onchange="startSelectedTable()">
                    <option value="1">1のだん</option>
                    <option value="2">2のだん</option>
                    <option value="3">3のだん</option>
                    <option value="4">4のだん</option>
                    <option value="5">5のだん</option>
                    <option value="6">6のだん</option>
                    <option value="7">7のだん</option>
                    <option value="8">8のだん</option>
                    <option value="9">9のだん</option>
                </select>
            </div>
        </div>

        <button type="button" class="hint-btn" onclick="openHint()">💡 ヒントのひょうを見る</button>
        
        <div class="question" id="question">1 × 1 ＝</div>
        <div class="visualizer" id="visualizer"></div>
        
        <input type="text" id="answer" placeholder="?" readonly onfocus="this.blur()">
        
        <div class="keypad" id="keypad">
            <button type="button" class="key-btn" onclick="inputNum('1')">1</button>
            <button type="button" class="key-btn" onclick="inputNum('2')">2</button>
            <button type="button" class="key-btn" onclick="inputNum('3')">3</button>
            <button type="button" class="key-btn" onclick="inputNum('4')">4</button>
            <button type="button" class="key-btn" onclick="inputNum('5')">5</button>
            <button type="button" class="key-btn" onclick="inputNum('6')">6</button>
            <button type="button" class="key-btn" onclick="inputNum('7')">7</button>
            <button type="button" class="key-btn" onclick="inputNum('8')">8</button>
            <button type="button" class="key-btn" onclick="inputNum('9')">9</button>
            <button type="button" class="key-btn key-action" onclick="clearNum()">C</button>
            <button type="button" class="key-btn" onclick="inputNum('0')">0</button>
            <button type="button" class="key-btn key-action" onclick="deleteNum()">⌫</button>
        </div>

        <button type="button" class="answer-btn" id="submit-btn" onclick="checkAnswer()">こたえる！</button>
        
        <div class="feedback" id="feedback"></div>
        <div class="score" id="score">いまのスコア: 0 てん</div>
    </div>

    <div id="hint-modal" class="modal-overlay">
        <div class="modal-content">
            <button type="button" class="close-btn" onclick="closeHint()">✖ とじる</button>
            <h2 style="color: #4a90e2; margin-top: 0;">📖 九九のひょう</h2>
            <div class="cheat-sheet" id="cheat-sheet-container"></div>
        </div>
    </div>

    <script>
        // エラー防止のため、ページが完全に読み込まれてから作動するように変更
        window.addEventListener('DOMContentLoaded', function() {
            
            let num1, num2;
            let score = 0;
            let isSequentialMode = true;
            let currentMultiplier = 1;
            let isCleared = false;

            const emojis = ["🍎", "🍊", "🍓", "🍉", "⭐", "🎈", "🍬", "🐥", "🚗"];
            const tableColors = ["#f39c12", "#e74c3c", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f", "#1abc9c", "#e67e22", "#34495e"];

            // --- テンキー機能 ---
            window.inputNum = function(n) {
                const ansInput = document.getElementById("answer");
                if (ansInput.value.length < 3) {
                    ansInput.value += n;
                }
            };

            window.deleteNum = function() {
                const ansInput = document.getElementById("answer");
                ansInput.value = ansInput.value.slice(0, -1);
            };

            window.clearNum = function() {
                document.getElementById("answer").value = "";
            };

            // --- ヒント機能 ---
            function generateCheatSheet() {
                const container = document.getElementById("cheat-sheet-container");
                container.innerHTML = ""; // 念のため中身をリセット
                for (let i = 1; i <= 9; i++) {
                    let col = document.createElement("div");
                    col.className = "cheat-col";
                    let header = document.createElement("h3");
                    header.innerText = i + "のだん";
                    header.style.backgroundColor = tableColors[i-1];
                    col.appendChild(header);
                    for (let j = 1; j <= 10; j++) {
                        let row = document.createElement("div");
                        row.className = "cheat-row";
                        row.innerText = i + " × " + j + " = " + (i * j);
                        col.appendChild(row);
                    }
                    container.appendChild(col);
                }
            }

            window.openHint = function() {
                document.getElementById("hint-modal").style.display = "block";
            };

            window.closeHint = function() {
                document.getElementById("hint-modal").style.display = "none";
            };

            // ヒントの黒い背景部分をタップしても閉じられるようにする
            document.getElementById("hint-modal").addEventListener("click", function(e) {
                if (e.target.id === "hint-modal") {
                    window.closeHint();
                }
            });

            // --- 問題出題機能 ---
            window.setMode = function(mode) {
                isSequentialMode = (mode === 'sequential');
                document.getElementById("btn-seq").classList.toggle("active", isSequentialMode);
                document.getElementById("btn-rand").classList.toggle("active", !isSequentialMode);
                document.getElementById("table-select").disabled = !isSequentialMode;
                window.startSelectedTable();
            };

            window.startSelectedTable = function() {
                isCleared = false;
                score = 0;
                currentMultiplier = 1;
                updateScoreDisplay();
                
                document.getElementById("answer").style.display = "inline-block";
                document.getElementById("keypad").style.display = "grid";
                document.getElementById("submit-btn").style.display = "inline-block";
                document.getElementById("visualizer").style.display = "flex";
                document.getElementById("feedback").innerText = "";
                nextQuestion();
            };

            function drawVisuals(n1, n2) {
                const visualizer = document.getElementById("visualizer");
                visualizer.innerHTML = ""; 
                const emoji = emojis[n1 - 1]; 
                for(let i = 0; i < n2; i++) {
                    const groupDiv = document.createElement("div");
                    groupDiv.className = "emoji-group";
                    let groupHtml = "";
                    for(let j = 0; j < n1; j++) {
                        groupHtml += emoji;
                    }
                    groupDiv.innerHTML = groupHtml;
                    visualizer.appendChild(groupDiv);
                }
            }

            function nextQuestion() {
                if (isCleared) return;

                if (isSequentialMode) {
                    const selectedTable = document.getElementById("table-select").value;
                    num1 = parseInt(selectedTable, 10);
                    num2 = currentMultiplier;
                } else {
                    num1 = Math.floor(Math.random() * 9) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                }
                
                document.getElementById("question").innerText = num1 + " × " + num2 + " ＝";
                window.clearNum();
                document.getElementById("feedback").innerText = "";
                
                drawVisuals(num1, num2);
            }

            window.checkAnswer = function() {
                if (isCleared) return;

                const answerInput = document.getElementById("answer").value;
                const userAnswer = parseInt(answerInput, 10);
                const feedbackEl = document.getElementById("feedback");

                if (answerInput === "" || isNaN(userAnswer)) {
                    feedbackEl.innerText = "すうじを いれてね！";
                    feedbackEl.style.color = "#ff8c00";
                    return;
                }

                if (userAnswer === num1 * num2) {
                    score += 10;
                    updateScoreDisplay();
                    feedbackEl.innerText = "💮 大せいかい！";
                    feedbackEl.style.color = "#4CAF50";
                    
                    if (isSequentialMode) {
                        currentMultiplier++;
                        if (currentMultiplier > 10) {
                            isCleared = true;
                            feedbackEl.innerText = "🎉 " + num1 + "のだん クリア！ 🎉";
                            feedbackEl.style.color = "#e91e63";
                            document.getElementById("question").innerText = "おめでとう！";
                            
                            document.getElementById("answer").style.display = "none";
                            document.getElementById("keypad").style.display = "none";
                            document.getElementById("submit-btn").style.display = "none";
                            document.getElementById("visualizer").style.display = "none";
                            return;
                        }
                    }
                    setTimeout(nextQuestion, 800); 
                } else {
                    feedbackEl.innerText = "💦 おしい！もういちど！";
                    feedbackEl.style.color = "#e74c3c";
                    window.clearNum(); 
                }
            }

            function updateScoreDisplay() {
                document.getElementById("score").innerText = "いまのスコア: " + score + " てん";
            }

            // パソコンのキーボード対応
            document.addEventListener("keydown", function(event) {
                const hintModal = document.getElementById("hint-modal");
                if(hintModal && hintModal.style.display === "block") return;
                if(isCleared) return;

                if (event.key >= "0" && event.key <= "9") {
                    window.inputNum(event.key);
                } else if (event.key === "Backspace") {
                    window.deleteNum();
                } else if (event.key === "Enter") {
                    window.checkAnswer();
                } else if (event.key.toLowerCase() === "c" || event.key === "Escape") {
                    window.clearNum();
                }
            });

            // 起動時の準備
            generateCheatSheet();
            window.setMode('sequential');
        });
    </script>

</body>
</html>
