<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わくわく九九れんしゅう</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', 'Comic Sans MS', sans-serif;
            background-color: #fff9e6;
            text-align: center;
            padding: 30px 10px;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto;
            border: 4px solid #ffb347;
        }
        h1 {
            color: #ff8c00;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .controls {
            background-color: #fff3e0;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
        }
        .mode-btn {
            background-color: #ffffff;
            color: #555;
            border: 2px solid #ddd;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }
        select {
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            background-color: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        select:disabled {
            border-color: #ccc;
            background-color: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .question {
            font-size: 50px;
            font-weight: bold;
            margin: 10px 0;
            color: #4a90e2;
        }
        /* 図解（絵文字）を表示するエリアのデザイン */
        .visualizer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 20px auto;
            min-height: 50px; /* 高さが変わって画面がガタガタするのを防ぐ */
        }
        .emoji-group {
            background-color: #f0f8ff;
            border: 2px dashed #a0c4ff;
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            gap: 2px;
            font-size: 20px;
        }
        input[type="number"] {
            font-size: 36px;
            width: 120px;
            text-align: center;
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 15px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #ffb347;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .answer-btn {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cc7000;
            transition: all 0.1s;
        }
        .answer-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .feedback {
            font-size: 24px;
            font-weight: bold;
            height: 35px;
            margin: 15px 0;
        }
        .score {
            font-size: 18px;
            color: #666;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ わくわく 九九れんしゅう ✨</h1>
        
        <div class="controls">
            <div class="mode-buttons">
                <button class="mode-btn active" id="btn-seq" onclick="setMode('sequential')">じゅんばん</button>
                <button class="mode-btn" id="btn-rand" onclick="setMode('random')">ランダム</button>
            </div>
            <div>
                <select id="table-select" onchange="startSelectedTable()">
                    <option value="1">1のだん</option>
                    <option value="2">2のだん</option>
                    <option value="3">3のだん</option>
                    <option value="4">4のだん</option>
                    <option value="5">5のだん</option>
                    <option value="6">6のだん</option>
                    <option value="7">7のだん</option>
                    <option value="8">8のだん</option>
                    <option value="9">9のだん</option>
                </select>
            </div>
        </div>
        
        <div class="question" id="question">1 × 1 ＝</div>
        
        <div class="visualizer" id="visualizer"></div>
        
        <input type="number" id="answer" placeholder="?" autocomplete="off">
        <br>
        <button class="answer-btn" id="submit-btn" onclick="checkAnswer()">こたえる！</button>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="score" id="score">いまのスコア: 0 てん</div>
    </div>

    <script>
        let num1, num2;
        let score = 0;
        let isSequentialMode = true;
        let currentMultiplier = 1;

        // 段ごとに違う絵文字が出るように設定
        const emojis = ["🍎", "🍊", "🍓", "🍉", "⭐", "🎈", "🍬", "🐥", "🚗"];

        function setMode(mode) {
            isSequentialMode = (mode === 'sequential');
            document.getElementById("btn-seq").classList.toggle("active", isSequentialMode);
            document.getElementById("btn-rand").classList.toggle("active", !isSequentialMode);
            document.getElementById("table-select").disabled = !isSequentialMode;
            startSelectedTable();
        }

        function startSelectedTable() {
            score = 0;
            currentMultiplier = 1;
            updateScoreDisplay();
            
            document.getElementById("answer").style.display = "inline-block";
            document.getElementById("submit-btn").style.display = "inline-block";
            document.getElementById("visualizer").style.display = "flex";
            document.getElementById("feedback").innerText = "";
            nextQuestion();
        }

        function drawVisuals(n1, n2) {
            const visualizer = document.getElementById("visualizer");
            visualizer.innerHTML = ""; // 前の絵を消す
            
            // 段（n1）に対応する絵文字を選ぶ
            const emoji = emojis[n1 - 1]; 

            // 「n1(1つ分の数)」が「n2(いくつ分)」あるという図を作る
            for(let i = 0; i < n2; i++) {
                const groupDiv = document.createElement("div");
                groupDiv.className = "emoji-group";
                
                let groupHtml = "";
                for(let j = 0; j < n1; j++) {
                    groupHtml += emoji;
                }
                
                groupDiv.innerHTML = groupHtml;
                visualizer.appendChild(groupDiv);
            }
        }

        function nextQuestion() {
            if (isSequentialMode) {
                const selectedTable = document.getElementById("table-select").value;
                num1 = parseInt(selectedTable, 10);
                num2 = currentMultiplier;
            } else {
                num1 = Math.floor(Math.random() * 9) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            }
            
            document.getElementById("question").innerText = `${num1} × ${num2} ＝`;
            document.getElementById("answer").value = "";
            document.getElementById("feedback").innerText = "";
            
            // 図解を描画
            drawVisuals(num1, num2);
            
            document.getElementById("answer").focus();
        }

        function checkAnswer() {
            const answerInput = document.getElementById("answer").value;
            const userAnswer = parseInt(answerInput, 10);
            const feedbackEl = document.getElementById("feedback");

            if (answerInput === "" || isNaN(userAnswer)) {
                feedbackEl.innerText = "すうじを いれてね！";
                feedbackEl.style.color = "#ff8c00";
                return;
            }

            if (userAnswer === num1 * num2) {
                score += 10;
                updateScoreDisplay();
                feedbackEl.innerText = "💮 大せいかい！";
                feedbackEl.style.color = "#4CAF50";
                
                if (isSequentialMode) {
                    currentMultiplier++;
                    if (currentMultiplier > 10) {
                        feedbackEl.innerText = `🎉 ${num1}のだん クリア！ 🎉`;
                        feedbackEl.style.color = "#e91e63";
                        document.getElementById("question").innerText = "おめでとう！";
                        document.getElementById("answer").style.display = "none";
                        document.getElementById("submit-btn").style.display = "none";
                        document.getElementById("visualizer").style.display = "none"; // 絵文字も隠す
                        return;
                    }
                }
                setTimeout(nextQuestion, 800); 
            } else {
                feedbackEl.innerText = "💦 おしい！もういちど！";
                feedbackEl.style.color = "#e74c3c";
                document.getElementById("answer").value = "";
                document.getElementById("answer").focus();
            }
        }

        function updateScoreDisplay() {
            document.getElementById("score").innerText = `いまのスコア: ${score} てん`;
        }

        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        setMode('sequential');
    </script>

</body>
</html>
