<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わくわく九九れんしゅう</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', 'Comic Sans MS', sans-serif;
            background-color: #fff9e6;
            text-align: center;
            padding: 30px 10px;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 550px;
            margin: 0 auto;
            border: 4px solid #ffb347;
            position: relative; /* ヒントボタンの配置用 */
        }
        h1 {
            color: #ff8c00;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .controls {
            background-color: #fff3e0;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
        }
        .mode-btn {
            background-color: #ffffff;
            color: #555;
            border: 2px solid #ddd;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }
        select {
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            background-color: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        select:disabled {
            border-color: #ccc;
            background-color: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .question {
            font-size: 50px;
            font-weight: bold;
            margin: 10px 0;
            color: #4a90e2;
        }
        .visualizer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 20px auto;
            min-height: 50px;
        }
        .emoji-group {
            background-color: #f0f8ff;
            border: 2px dashed #a0c4ff;
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            gap: 2px;
            font-size: 20px;
        }
        input[type="number"] {
            font-size: 36px;
            width: 120px;
            text-align: center;
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 15px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #ffb347;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .answer-btn {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cc7000;
            transition: all 0.1s;
        }
        .answer-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .feedback {
            font-size: 24px;
            font-weight: bold;
            height: 35px;
            margin: 15px 0;
        }
        .score {
            font-size: 18px;
            color: #666;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #eee;
        }

        /* ----- ヒントボタンとモーダル（ポップアップ）のデザイン ----- */
        .hint-btn {
            background-color: #fff;
            color: #4a90e2;
            border: 2px solid #4a90e2;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .hint-btn:hover {
            background-color: #f0f8ff;
        }
        
        .modal-overlay {
            display: none; /* 初期状態は隠す */
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 半透明の黒背景 */
        }
        .modal-content {
            background-color: #fff9e6;
            margin: 5% auto;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh; /* 画面に収まらない時はスクロール */
            overflow-y: auto;
            border: 4px solid #4a90e2;
            position: relative;
        }
        .close-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .cheat-sheet {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .cheat-col {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 120px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cheat-col h3 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px dashed #ccc;
            font-size: 18px;
            color: white;
            border-radius: 5px;
        }
        .cheat-row {
            font-size: 18px;
            margin: 5px 0;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ わくわく 九九れんしゅう ✨</h1>
        
        <div class="controls">
            <div class="mode-buttons">
                <button class="mode-btn active" id="btn-seq" onclick="setMode('sequential')">じゅんばん</button>
                <button class="mode-btn" id="btn-rand" onclick="setMode('random')">ランダム</button>
            </div>
            <div>
                <select id="table-select" onchange="startSelectedTable()">
                    <option value="1">1のだん</option>
                    <option value="2">2のだん</option>
                    <option value="3">3のだん</option>
                    <option value="4">4のだん</option>
                    <option value="5">5のだん</option>
                    <option value="6">6のだん</option>
                    <option value="7">7のだん</option>
                    <option value="8">8のだん</option>
                    <option value="9">9のだん</option>
                </select>
            </div>
        </div>

        <button class="hint-btn" onclick="openHint()">💡 ヒントのひょうを見る</button>
        
        <div class="question" id="question">1 × 1 ＝</div>
        
        <div class="visualizer" id="visualizer"></div>
        
        <input type="number" id="answer" placeholder="?" autocomplete="off">
        <br>
        <button class="answer-btn" id="submit-btn" onclick="checkAnswer()">こたえる！</button>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="score" id="score">いまのスコア: 0 てん</div>
    </div>

    <div id="hint-modal" class="modal-overlay" onclick="closeHint(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeHint()">✖ とじる</button>
            <h2 style="color: #4a90e2; margin-top: 0;">📖 九九のひょう</h2>
            <div class="cheat-sheet" id="cheat-sheet-container">
                </div>
        </div>
    </div>

    <script>
        let num1, num2;
        let score = 0;
        let isSequentialMode = true;
        let currentMultiplier = 1;

        const emojis = ["🍎", "🍊", "🍓", "🍉", "⭐", "🎈", "🍬", "🐥", "🚗"];
        // ヒント表の各段の色
        const tableColors = ["#f39c12", "#e74c3c", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f", "#1abc9c", "#e67e22", "#34495e"];

        // アプリ起動時にヒント表（チートシート）を自動で作成する
        function generateCheatSheet() {
            const container = document.getElementById("cheat-sheet-container");
            for (let i = 1; i <= 9; i++) {
                let col = document.createElement("div");
                col.className = "cheat-col";
                
                // 見出し（色付き）
                let header = document.createElement("h3");
                header.innerText = `${i}のだん`;
                header.style.backgroundColor = tableColors[i-1];
                col.appendChild(header);

                // 1〜10までの掛け算を入れる
                for (let j = 1; j <= 10; j++) {
                    let row = document.createElement("div");
                    row.className = "cheat-row";
                    row.innerText = `${i} × ${j} = ${i * j}`;
                    col.appendChild(row);
                }
                container.appendChild(col);
            }
        }

        // ヒント画面を開く・閉じる関数
        function openHint() {
            document.getElementById("hint-modal").style.display = "block";
        }
        function closeHint(e) {
            document.getElementById("hint-modal").style.display = "none";
            document.getElementById("answer").focus(); // 閉じたらすぐに入力できるようにする
        }

        function setMode(mode) {
            isSequentialMode = (mode === 'sequential');
            document.getElementById("btn-seq").classList.toggle("active", isSequentialMode);
            document.getElementById("btn-rand").classList.toggle("active", !isSequentialMode);
            document.getElementById("table-select").disabled = !isSequentialMode;
            startSelectedTable();
        }

        function startSelectedTable() {
            score = 0;
            currentMultiplier = 1;
            updateScoreDisplay();
            
            document.getElementById("answer").style.display = "inline-block";
            document.getElementById("submit-btn").style.display = "inline-block";
            document.getElementById("visualizer").style.display = "flex";
            document.getElementById("feedback").innerText = "";
            nextQuestion();
        }

        function drawVisuals(n1, n2) {
            const visualizer = document.getElementById("visualizer");
            visualizer.innerHTML = ""; 
            const emoji = emojis[n1 - 1]; 

            for(let i = 0; i < n2; i++) {
                const groupDiv = document.createElement("div");
                groupDiv.className = "emoji-group";
                let groupHtml = "";
                for(let j = 0; j < n1; j++) {
                    groupHtml += emoji;
                }
                groupDiv.innerHTML = groupHtml;
                visualizer.appendChild(groupDiv);
            }
        }

        function nextQuestion() {
            if (isSequentialMode) {
                const selectedTable = document.getElementById("table-select").value;
                num1 = parseInt(selectedTable, 10);
                num2 = currentMultiplier;
            } else {
                num1 = Math.floor(Math.random() * 9) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            }
            
            document.getElementById("question").innerText = `${num1} × ${num2} ＝`;
            document.getElementById("answer").value = "";
            document.getElementById("feedback").innerText = "";
            
            drawVisuals(num1, num2);
            document.getElementById("answer").focus();
        }

        function checkAnswer() {
            const answerInput = document.getElementById("answer").value;
            const userAnswer = parseInt(answerInput, 10);
            const feedbackEl = document.getElementById("feedback");

            if (answerInput === "" || isNaN(userAnswer)) {
                feedbackEl.innerText = "すうじを いれてね！";
                feedbackEl.style.color = "#ff8c00";
                return;
            }

            if (userAnswer === num1 * num2) {
                score += 10;
                updateScoreDisplay();
                feedbackEl.innerText = "💮 大せいかい！";
                feedbackEl.style.color = "#4CAF50";
                
                if (isSequentialMode) {
                    currentMultiplier++;
                    if (currentMultiplier > 10) {
                        feedbackEl.innerText = `🎉 ${num1}のだん クリア！ 🎉`;
                        feedbackEl.style.color = "#e91e63";
                        document.getElementById("question").innerText = "おめでとう！";
                        document.getElementById("answer").style.display = "none";
                        document.getElementById("submit-btn").style.display = "none";
                        document.getElementById("visualizer").style.display = "none";
                        return;
                    }
                }
                setTimeout(nextQuestion, 800); 
            } else {
                feedbackEl.innerText = "💦 おしい！もういちど！";
                feedbackEl.style.color = "#e74c3c";
                document.getElementById("answer").value = "";
                document.getElementById("answer").focus();
            }
        }

        function updateScoreDisplay() {
            document.getElementById("score").innerText = `いまのスコア: ${score} てん`;
        }

        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        // アプリ起動時の初期設定
        generateCheatSheet(); // ヒント表を作っておく
        setMode('sequential');
    </script>

</body>
</html>
